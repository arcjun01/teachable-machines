<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
            transition: background-color 0.3s;
        }
        #webcam-container canvas {
            display: none;
            border-radius: 8px;
            margin: 0 auto;
        }
        #webcam-container.active canvas {
            display: block;
        }
        #label-container div {
            font-size: 1.1rem;
            padding: 0.25rem 0;
        }
        #box {
            width: 50px;
            height: 50px;
            background: #2563eb;
            margin: 40px auto; 
            border-radius: 4px;
            transition: transform 0.2s ease;
        }
        #message {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 10px 0;
            height: 2rem;
            color: #2563eb;
        }
        button {
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            color: white;
            background: #2563eb;
            margin: 1rem 0;
        }
        button.stop { background: #dc2626; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <h1>Simon Says Game</h1>

    <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div id="message"></div>
    <div id="box"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        // REPLACE THIS with your model URL from Teachable Machine:
        const URL = "https://teachablemachine.withgoogle.com/models/AilEMU-pc/";

        let model, webcam, labelContainer, maxPredictions;
        let isRunning = false;
        
        let currentGoal = "";
        const gestures = ["Thumbs up", "Thumbs down", "Ok", "Holding phone"];

        const messageEl = document.getElementById("message");
        const box = document.getElementById("box");

        // Function to pick a new random gesture
        function pickNewGoal() {
            const randomIndex = Math.floor(Math.random() * gestures.length);
            currentGoal = gestures[randomIndex];
            messageEl.textContent = "Simon says: " + currentGoal;
            messageEl.style.color = "#2563eb"; 
        }
        
        async function init() {
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();

            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();

            const container = document.getElementById("webcam-container");
            container.innerHTML = "";
            container.appendChild(webcam.canvas);
            container.classList.add("active");

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }

            // Pick the first goal when starting
            pickNewGoal();

            isRunning = true;
            window.requestAnimationFrame(loop);
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);

            // Find the class with the highest probability
            let topClass = prediction[0];
            for (let i = 1; i < prediction.length; i++) {
                if (prediction[i].probability > topClass.probability) {
                    topClass = prediction[i];
                }
            }

            // topClass.className is the winning labe
            // topClass.probability is how confident the model is
            console.log(topClass.className, topClass.probability);

            // Update the display
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }

            // SIMON SAYS LOGIC
            if (topClass.className === currentGoal && topClass.probability > 0.90) {
                messageEl.textContent = "Correct! Well done!";
                messageEl.style.color = "#16a34a"; // Green text
                document.body.style.backgroundColor = "#dcfce7"; 
                
                // Wait 1.5 seconds, then pick a new goal
                isRunning = false; 
                setTimeout(() => {
                    document.body.style.backgroundColor = "white";
                    pickNewGoal();
                    isRunning = true;
                    window.requestAnimationFrame(loop);
                }, 1500);
            }

            // Move an element on screen
            if (topClass.className === "Holding phone" && topClass.probability > 0.7) {
                box.style.transform = "translateY(-50px)";
            } else {
                box.style.transform = "translateY(0)";
            }
        }

        async function toggleCamera() {
            const button = document.getElementById("toggleButton");
            if (!isRunning) {
                await init();
                button.textContent = "Stop Camera";
                button.classList.add("stop");
            } else {
                isRunning = false;
                webcam.stop();
                document.getElementById("webcam-container").classList.remove("active");
                button.textContent = "Start Camera";
                button.classList.remove("stop");
                document.body.style.backgroundColor = "white";
                messageEl.textContent = "";
            }
        }
    </script>
</body>
</html>
